<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">관리자 회원가입</h2>
        
        <input type="email" id="email" placeholder="이메일" class="w-full p-3 mb-4 border rounded">
        <input type="password" id="pw" placeholder="비밀번호 (9~15자)" class="w-full p-3 mb-2 border rounded">
        <input type="password" id="pwCheck" placeholder="비밀번호 확인" class="w-full p-3 mb-0 border rounded">
        
        <div class="h-6 mb-2">
            <p id="pwError" class="text-red-500 text-xs hidden">*비밀번호가 불일치합니다.</p>
        </div>
        
        <input type="text" id="name" placeholder="이름" class="w-full p-3 mb-4 border rounded">
        
        <select id="unitSelect" class="w-full p-3 mb-2 border rounded bg-white">
            <option value="">부대 선택 (선택 사항)</option>
        </select>
        <button id="showCreateBtn" class="text-sm text-blue-500 mb-4 underline">소속 부대가 없다면? 부대 생성하기</button>
        <input type="text" id="newUnitName" placeholder="새 부대 이름 입력" class="w-full p-3 mb-4 border rounded hidden">
        
        <input type="text" id="position" placeholder="직책" class="w-full p-3 mb-6 border rounded">
        
        <button id="registerBtn" class="w-full bg-purple-600 text-white py-3 rounded font-bold hover:bg-purple-700">관리자 가입하기</button>
    </div>

    <script>
        const sb = supabase.createClient('https://hqtjmfrwmgllpyrthxjs.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxdGptZnJ3bWdsbHB5cnRoeGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDI3NjEsImV4cCI6MjA5ODY3ODc2MX0.vyY5ljWGH2jtA6nJEPHOjekJW0DDT2gZ-Bor3F9968Q');

        // 공통 토스트 함수
        function triggerToast(message) {
            const existingToast = document.getElementById('custom-toast');
            if (existingToast) existingToast.remove();

            const formattedMessage = message.replace(/\n/g, '<br>');
            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = "fixed inset-0 z-[9999] flex flex-col items-center justify-center p-6 bg-black/60 transition-opacity duration-500 cursor-pointer";

            toast.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-2xl text-center max-w-xs w-full">
                    <p class="text-gray-800 font-bold text-lg mb-2">${formattedMessage}</p>
                    <p class="text-gray-400 text-xs">(터치로 닫기)</p>
                </div>
            `;

            toast.addEventListener('click', () => toast.remove());
            toast.addEventListener('touchstart', () => toast.remove());
            document.body.appendChild(toast);

            setTimeout(() => {
                if (document.body.contains(toast)) {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }
            }, 4500);
        }

        // 페이지 로드 시 부대 목록 불러오기
        window.onload = async () => {
            const { data: units } = await sb.from('units').select('*');
            const select = document.getElementById('unitSelect');
            if(units) {
                units.forEach(unit => {
                    const option = document.createElement('option');
                    option.value = unit.unit_code;
                    option.textContent = unit.unit_name;
                    select.appendChild(option);
                });
            }
        };

        // 비밀번호 검증 로직
        const pw = document.getElementById('pw');
        const pwCheck = document.getElementById('pwCheck');
        const pwError = document.getElementById('pwError');

        function validatePassword() {
            if (pwCheck.value !== "" && pw.value !== pwCheck.value) {
                pwError.classList.remove('hidden');
            } else {
                pwError.classList.add('hidden');
            }
        }
        pw.addEventListener('input', validatePassword);
        pwCheck.addEventListener('input', validatePassword);

        // 부대 생성 UI 토글
        document.getElementById('showCreateBtn').addEventListener('click', (e) => {
            e.preventDefault();
            const inputField = document.getElementById('newUnitName');
    
    // 강제로 display 속성 제어
            if (inputField.style.display === 'none') {
                inputField.style.display = 'block'; // 보이게 함
            } else {
                inputField.style.display = 'none';  // 숨김
            }
        });


        document.getElementById('showCreateBtn').addEventListener('click', (e) => {
            e.preventDefault();
            console.log("버튼 클릭 이벤트 발생!"); // 이 코드가 중요합니다.
            const element = document.getElementById('newUnitName');
            element.classList.toggle('hidden');
            console.log("현재 hidden 상태:", element.classList.contains('hidden'));
        });

        // 가입 버튼 로직
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pw').value;
            const name = document.getElementById('name').value;
            const position = document.getElementById('position').value;
            const newUnitName = document.getElementById('newUnitName').value;
            const unitSelect = document.getElementById('unitSelect').value;

            if (!email || !password || !name) {
                triggerToast('필수 정보를 모두 입력해주세요.');
                return;
            }

            const { data: authData, error: authError } = await sb.auth.signUp({ email, password });
            if (authError) { triggerToast('가입 실패:\n' + authError.message); return; }

            let targetUnitCode = unitSelect;

            if (newUnitName) {
                const newCode = Math.random().toString(36).substring(2, 7).toUpperCase();
                const { error: unitError } = await sb.from('units').insert([{ unit_code: newCode, unit_name: newUnitName }]);
                if (unitError) { triggerToast('부대 생성 실패'); return; }
                targetUnitCode = newCode;
            }

            const { error: profileError } = await sb.from('profiles').insert([{
                id: authData.user.id,
                email: email,
                name: name,
                role: 'admin',
                unit_code: targetUnitCode || null,
                position: position
            }]);

            if (profileError) { triggerToast('프로필 저장 실패'); }
            else { triggerToast('관리자 가입 성공!\n로그인 페이지로 이동합니다.'); setTimeout(() => { window.location.href = 'index.html'; }, 2000); }
        });
    </script>
</body>
</html>
