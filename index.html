<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출타 관리 앱 - 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">로그인</h2>
        <input type="email" id="email" placeholder="이메일" class="w-full p-3 mb-4 border rounded">
        <input type="password" id="password" placeholder="비밀번호" class="w-full p-3 mb-6 border rounded">
        <button id="loginBtn" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">로그인</button>
        
        <div class="mt-4 text-center">
            <a href="register-user.html" class="text-sm text-blue-500 mr-4">회원가입</a>
            <a href="register-admin.html" class="text-sm text-purple-500">관리자 가입</a>
        </div>
    </div>

    <script>
        // Supabase 설정
        const supabaseUrl = 'https://hqtjmfrwmgllpyrthxjs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxdGptZnJ3bWdsbHB5cnRoeGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDI3NjEsImV4cCI6MjA5ODY3ODc2MX0.vyY5ljWGH2jtA6nJEPHOjekJW0DDT2gZ-Bor3F9968Q';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        // 토스트 알림 함수
        function triggerToast(message) {
            const existingToast = document.getElementById('custom-toast');
            if (existingToast) existingToast.remove();

            const formattedMessage = message.replace(/\n/g, '<br>');
            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = "fixed inset-0 z-[9999] flex flex-col items-center justify-center p-6 bg-black/60 transition-opacity duration-500 cursor-pointer";

            toast.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-2xl text-center max-w-xs w-full">
                    <p class="text-gray-800 font-bold text-lg mb-2">${formattedMessage}</p>
                    <p class="text-gray-400 text-xs">(터치로 닫기)</p>
                </div>
            `;

            toast.addEventListener('click', () => toast.remove());
            toast.addEventListener('touchstart', () => toast.remove());
            document.body.appendChild(toast);

            setTimeout(() => {
                if (document.body.contains(toast)) {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }
            }, 4500);
        }

        // 로그인 로직
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                triggerToast('이메일과 비밀번호를\n모두 입력해주세요.');
                return;
            }

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                triggerToast('로그인 실패:\n' + error.message);
            } else {
                triggerToast('로그인 성공!\n메인 화면으로 이동합니다.');
                setTimeout(() => { window.location.href = 'schedule.html'; }, 2000);
            }
        });
    </script>
</body>
</html>
