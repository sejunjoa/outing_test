<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>
<script src="toast.js"></script>
<script src="auth.js"></script>

<title>회원가입</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard','Noto Sans KR',sans-serif;}
body{background:#f2f4f8;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
.register-box{width:100%;max-width:420px;background:#fff;border-radius:18px;padding:35px 25px;box-shadow:0 10px 25px rgba(0,0,0,.08);}
.title{text-align:center;font-size:28px;font-weight:700;margin-bottom:30px;}
.input{width:100%;height:54px;border:1px solid #d9d9d9;border-radius:10px;padding:0 16px;font-size:16px;margin-bottom:15px;outline:none;}
.input:focus{border-color:#2B7CFF;}
.register-btn{width:100%;height:54px;border:none;border-radius:10px;background:#2B7CFF;color:#fff;font-size:18px;font-weight:600;cursor:pointer;margin-top:5px;}
.register-btn:active{transform:scale(.98);}
.back{margin-top:20px;text-align:center;}
.back a{color:#2E5E4E;text-decoration:none;font-weight:600;}
.back a:hover{text-decoration:underline;}
.message{height:18px;margin-top:-10px;margin-bottom:12px;font-size:12px;line-height:18px;}
.guide{color:#2B7CFF;}
.error{color:#E53935;visibility:hidden;}
@media(max-width:420px){.register-box{padding:30px 20px;}.title{font-size:26px;}}
</style>
</head>

<body>

<div class="register-box">
    <div class="title">회원가입</div>

    <input type="email" id="email" class="input" placeholder="이메일">

    <input type="password" id="password" class="input" placeholder="비밀번호">
    <div class="message guide">*8~15글자, 숫자 포함</div>

    <input type="password" id="password-confirm" class="input" placeholder="비밀번호 확인">
    <div id="pwCheckMsg" class="message error">*비밀번호가 불일치합니다.</div>

    <input type="text" id="name" class="input" placeholder="이름">
    <input type="tel" id="phone" class="input" placeholder="휴대폰 번호 (01012345678)">
    <input type="text" id="unit" class="input" placeholder="부대 선택" readonly>
    <input type="date" id="enlistDate" class="input" placeholder="입대일">
    <input type="date" id="dischargeDate" class="input" placeholder="전역일">

    <button id="registerBtn" class="register-btn">회원가입</button>

    <div class="back">
        <a href="index.html">← 로그인으로</a>
    </div>
</div>

<div id="unitModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-5">
    <div class="bg-white rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden">
        <div class="p-4 text-lg font-bold text-center border-b">부대 선택</div>
        <div class="p-4">
            <input id="unitSearch" type="text" placeholder="부대찾기" class="w-full border rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div id="unitList" class="flex-1 overflow-y-auto"></div>
        <button id="closeUnitModal" class="p-4 bg-gray-100 font-semibold active:bg-gray-200">닫기</button>
    </div>
</div>

<script>
const email=document.getElementById("email");
const password=document.getElementById("password");
const passwordConfirm=document.getElementById("password-confirm");
const nameInput=document.getElementById("name");
const phone=document.getElementById("phone");
const unit=document.getElementById("unit");
const enlistDate=document.getElementById("enlistDate");
const dischargeDate=document.getElementById("dischargeDate");
const registerBtn=document.getElementById("registerBtn");
const pwCheckMsg=document.getElementById("pwCheckMsg");

const unitModal=document.getElementById("unitModal");
const unitSearch=document.getElementById("unitSearch");
const unitList=document.getElementById("unitList");
const closeUnitModal=document.getElementById("closeUnitModal");

const passwordRegex=/^(?=.*\d).{8,15}$/;
const phoneRegex=/^01[0-9]{8,9}$/;

let selectedUnitId=null;
let registering=false;

function checkPassword(){
    if(passwordConfirm.value.length===0){
        pwCheckMsg.style.visibility="hidden";
        return;
    }
    pwCheckMsg.style.visibility=password.value===passwordConfirm.value?"hidden":"visible";
}

async function loadUnits(keyword=""){
    keyword=keyword.trim();

    let query=sb
        .from("units")
        .select("id,unit_name,unit_code")
        .order("unit_name");

    if(keyword!==""){
        query=query.or(`unit_name.ilike.*${keyword}*,unit_code.ilike.*${keyword}*`);
    }

    const {data,error}=await query;

    if(error){
        console.error(error);
        unitList.innerHTML=`<div class="text-center text-red-500 py-6">부대를 불러오지 못했습니다.</div>`;
        return;
    }

    if(data.length===0){
        unitList.innerHTML=`<div class="text-center text-gray-500 py-6">검색 결과가 없습니다.</div>`;
        return;
    }

    unitList.innerHTML="";

    data.forEach(item=>{
        const btn=document.createElement("button");
        btn.className="w-full text-left px-4 py-4 border-b hover:bg-gray-50 active:bg-gray-100";
        btn.innerHTML=`<div class="font-semibold">${item.unit_name} (${item.unit_code})</div>`;

        btn.onclick=()=>{
            selectedUnitId=item.id;
            unit.value=`${item.unit_name} (${item.unit_code})`;
            unitModal.classList.add("hidden");
            unitModal.classList.remove("flex");
        };

        unitList.appendChild(btn);
    });
}

async function waitForProfile(userId){
    for(let i=0;i<10;i++){
        const {data:profile,error}=await sb
            .from("profiles")
            .select("id")
            .eq("id",userId)
            .maybeSingle();

        if(error) console.error(error);
        if(profile) return true;

        await new Promise(resolve=>setTimeout(resolve,200));
    }

    return false;
}

password.addEventListener("input",checkPassword);
passwordConfirm.addEventListener("input",checkPassword);

unit.addEventListener("click",()=>{
    unitSearch.value="";
    unitModal.classList.remove("hidden");
    unitModal.classList.add("flex");
    loadUnits();
});

unitSearch.addEventListener("input",()=>loadUnits(unitSearch.value));

closeUnitModal.addEventListener("click",()=>{
    unitModal.classList.add("hidden");
    unitModal.classList.remove("flex");
});

registerBtn.addEventListener("click",async()=>{
    if(registering) return;

    const emailValue=email.value.trim();
    const phoneNumber=phone.value.replace(/\D/g,"");

    if(emailValue===""){
        triggerToast("이메일을 입력하세요.");
        email.focus();
        return;
    }

    if(!passwordRegex.test(password.value)){
        triggerToast("비밀번호는 8~15글자이며\n숫자를 포함해야 합니다.");
        password.focus();
        return;
    }

    if(password.value!==passwordConfirm.value){
        triggerToast("비밀번호가 일치하지 않습니다.");
        passwordConfirm.focus();
        return;
    }

    if(nameInput.value.trim()===""){
        triggerToast("이름을 입력하세요.");
        nameInput.focus();
        return;
    }

    if(!phoneRegex.test(phoneNumber)){
        triggerToast("휴대폰 번호를 정확히 입력하세요.");
        phone.focus();
        return;
    }

    if(selectedUnitId===null){
        triggerToast("부대를 선택하세요.");
        return;
    }

if(enlistDate.value===""){
    triggerToast("입대일을 입력하세요.");
    enlistDate.focus();
    return;
}

if(dischargeDate.value===""){
    triggerToast("전역일을 입력하세요.");
    dischargeDate.focus();
    return;
}

if(new Date(enlistDate.value) > new Date(dischargeDate.value)){
    triggerToast("입대일은 전역일보다\n늦을 수 없습니다.");
    enlistDate.focus();
    return;
}

    registering=true;
    registerBtn.disabled=true;

    try{
        const {data,error}=await sb.auth.signUp({
            email:emailValue,
            password:password.value,
            options:{
                data:{
                    display_name:nameInput.value.trim(),
                    phone:phoneNumber,
                    role:"user"
                }
            }
        });

        if(error){
            if(error.message.toLowerCase().includes("already registered")){
                triggerToast("이미 등록된 이메일입니다.");
            }else{
                triggerToast(error.message);
            }
            return;
        }

        const ready=await waitForProfile(data.user.id);

        if(!ready){
            triggerToast("프로필 생성에 실패했습니다.\n잠시 후 다시 시도해주세요.");
            return;
        }

        const {error:updateError}=await sb
            .from("profiles")
            .update({
                unit_id:selectedUnitId,
                phone:phoneNumber,
                enlist_date:enlistDate.value,
                discharge_date:dischargeDate.value
            })
            .eq("id",data.user.id);

        if(updateError){
            triggerToast("회원정보 저장 실패\n"+updateError.message);
            return;
        }

        triggerToast("회원가입이 완료되었습니다.\n로그인 페이지로 이동합니다.");

        setTimeout(()=>{
            location.replace("index.html");
        },1500);

    }finally{
        registering=false;
        registerBtn.disabled=false;
    }
});
</script>

</body>
</html>
