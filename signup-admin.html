<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>관리자 회원가입</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-emerald-50 min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="w-11/12 max-w-sm bg-white p-6 rounded-3xl shadow-xl">
        <h2 class="text-2xl font-bold text-emerald-800 mb-6 text-center">관리자 회원가입</h2>
        
        <div class="space-y-4">
            <input type="text" id="full_name" placeholder="이름" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200">
            <input type="email" id="email" placeholder="이메일" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200">
            
            <input type="password" id="password" placeholder="비밀번호" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200">
            
            <div class="h-16">
                <input type="password" id="confirm-password" placeholder="비밀번호 확인" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200 transition-all">
                <p id="password-error" class="text-red-500 text-xs mt-1 font-bold hidden">
                    *비밀번호가 불일치합니다
                </p>
            </div>

            <input type="text" id="unit" placeholder="부대명 또는 부대코드(5자리) [선택]" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-200">
            <input type="text" id="role" value="admin" class="hidden"> </div>

        <button onclick="signUp()" class="w-full mt-8 py-4 bg-emerald-700 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">
            관리자 가입 완료
        </button>
        
        <button onclick="history.back()" class="w-full mt-3 py-2 text-gray-400 text-sm font-semibold">
            뒤로가기
        </button>
    </div>

<script>
    // Supabase 초기화
    const supabase = supabase.createClient('https://vahsvvxyrxqscifeqlfe.supabase.co/rest/v1/', 'sb_publishable_KYVt3clswe7QjSRG6sqVoA_pU3c91hl');

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fullName = document.getElementById('full_name').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (password !== confirmPassword) {
            alert("비밀번호가 일치하지 않습니다.");
            return;
        }

        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: {
                    full_name: fullName,
                    role: 'admin' // 이 값이 DB 트리거로 전달됩니다.
                }
            }
        });

        if (error) {
            alert("가입 실패: " + error.message);
        } else {
            alert("가입 성공! 로그인 페이지로 이동합니다.");
            location.href = 'login-admin.html';
        }
    }

    // 기존 비밀번호 일치 확인 로직 유지
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const errorMsg = document.getElementById('password-error');

    function checkPasswordMatch() {
        if (confirmInput.value.length > 0) {
            if (passwordInput.value !== confirmInput.value) {
                errorMsg.classList.remove('hidden');
            } else {
                errorMsg.classList.add('hidden');
            }
        }
    }
    passwordInput.addEventListener('input', checkPasswordMatch);
    confirmInput.addEventListener('input', checkPasswordMatch);
</script>

</body>
</html>
