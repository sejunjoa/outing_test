<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오프라인</title>
<style>
*{box-sizing:border-box;font-family:'Pretendard','Noto Sans KR',sans-serif;}
body{margin:0;min-height:100vh;background:#f2f4f8;display:flex;align-items:center;justify-content:center;padding:24px;color:#111827;}
.card{width:100%;max-width:360px;background:white;border-radius:20px;padding:28px 22px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.08);}
.icon{font-size:42px;margin-bottom:12px;}
h1{font-size:22px;margin:0 0 10px;font-weight:800;}
p{font-size:14px;line-height:1.6;color:#6b7280;margin:0 0 18px;}
button{height:44px;border:0;border-radius:12px;background:#10b981;color:white;font-weight:800;padding:0 18px;cursor:pointer;}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>인터넷 연결이 필요합니다</h1>
    <p>연결 상태를 확인한 뒤 다시 시도해주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
